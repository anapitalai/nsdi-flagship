name: Build and deploy app

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: nsdi-flagship.raliku.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:admin123@170.64.167.7:30432/nsdi-flagship
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Check deploy secrets
        id: deploy_secrets
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          missing=0
          for name in DEPLOY_SSH_KEY DEPLOY_USER DEPLOY_PATH DEPLOY_PORT; do
            if [[ -z "${!name}" ]]; then
              echo "::warning::Missing secret ${name}; deployment steps will be skipped."
              missing=1
            fi
          done

          if [[ "$missing" -eq 0 ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare deploy bundle
        if: steps.deploy_secrets.outputs.enabled == 'true'
        shell: bash
        run: |
          DEPLOY_DIR="$RUNNER_TEMP/deploy"
          mkdir -p "$DEPLOY_DIR/.next"
          rsync -a --delete .next/standalone/ "$DEPLOY_DIR/"
          rsync -a --delete .next/static/ "$DEPLOY_DIR/.next/static/"
          if [[ -d node_modules/.prisma ]]; then
            mkdir -p "$DEPLOY_DIR/node_modules"
            rsync -a node_modules/.prisma/ "$DEPLOY_DIR/node_modules/.prisma/"
          fi
          if [[ -d node_modules/@prisma ]]; then
            mkdir -p "$DEPLOY_DIR/node_modules/@prisma"
            rsync -a node_modules/@prisma/ "$DEPLOY_DIR/node_modules/@prisma/"
          fi
          if [[ -d public ]]; then
            rsync -a --delete public/ "$DEPLOY_DIR/public/"
          fi

      - name: Start SSH agent
        if: steps.deploy_secrets.outputs.enabled == 'true'
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/deploy_key"
          umask 077

          if [[ "${DEPLOY_SSH_KEY}" == *"-----BEGIN "*"PRIVATE KEY-----"* ]]; then
            printf '%s\n' "${DEPLOY_SSH_KEY}" | sed 's/\r$//' > "$KEY_FILE"
          elif [[ "${DEPLOY_SSH_KEY}" == *"\\n"*"-----BEGIN "*"PRIVATE KEY-----"* ]]; then
            printf '%b' "${DEPLOY_SSH_KEY}" | sed 's/\r$//' > "$KEY_FILE"
          else
            if ! printf '%s' "${DEPLOY_SSH_KEY}" | tr -d ' \n\r\t' | base64 --decode > "$KEY_FILE" 2>/dev/null; then
              echo "::error::DEPLOY_SSH_KEY is not a valid SSH private key block and not valid base64."
              echo "::error::Store the full private key (BEGIN/END lines) or a base64-encoded private key."
              exit 1
            fi
          fi

          chmod 600 "$KEY_FILE"

          if ! ssh-keygen -y -f "$KEY_FILE" >/dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY could not be parsed as a private key."
            echo "::error::If this key is passphrase-protected, generate a dedicated deploy key without a passphrase."
            exit 1
          fi

          eval "$(ssh-agent -s)"
          ssh-add "$KEY_FILE"

          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          rm -f "$KEY_FILE"

      - name: Configure known hosts
        if: steps.deploy_secrets.outputs.enabled == 'true'
        shell: bash
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [[ -n "${DEPLOY_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Sync build to web server
        if: steps.deploy_secrets.outputs.enabled == 'true'
        shell: bash
        env:
          DEPLOY_DIR: ${{ runner.temp }}/deploy
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -d "$DEPLOY_DIR"
          rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT" \
            "$DEPLOY_DIR/" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
